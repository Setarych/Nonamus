<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(200,200)">
    
    <!-- 8 сегментов -->
    <g>
      <!-- функция сектора: радиус 180 -->
      <!-- каждый сектор = 45° -->

      <path d="M0,0 L180,0 A180,180 0 0,1 127.3,127.3 Z" fill="#ff4d4d"/>
      <path d="M0,0 L127.3,127.3 A180,180 0 0,1 0,180 Z" fill="#ff944d"/>
      <path d="M0,0 L0,180 A180,180 0 0,1 -127.3,127.3 Z" fill="#ffd24d"/>
      <path d="M0,0 L-127.3,127.3 A180,180 0 0,1 -180,0 Z" fill="#8cff66"/>
      <path d="M0,0 L-180,0 A180,180 0 0,1 -127.3,-127.3 Z" fill="#4dd2ff"/>
      <path d="M0,0 L-127.3,-127.3 A180,180 0 0,1 0,-180 Z" fill="#4d79ff"/>
      <path d="M0,0 L0,-180 A180,180 0 0,1 127.3,-127.3 Z" fill="#b84dff"/>
      <path d="M0,0 L127.3,-127.3 A180,180 0 0,1 180,0 Z" fill="#ff4da6"/>
    </g>

    <!-- внешнее кольцо -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#d4af37" stroke-width="10"/>

    <!-- разделительные линии -->
    <g stroke="#ffffff" stroke-width="2">
      <line x1="0" y1="0" x2="180" y2="0"/>
      <line x1="0" y1="0" x2="127.3" y2="127.3"/>
      <line x1="0" y1="0" x2="0" y2="180"/>
      <line x1="0" y1="0" x2="-127.3" y2="127.3"/>
      <line x1="0" y1="0" x2="-180" y2="0"/>
      <line x1="0" y1="0" x2="-127.3" y2="-127.3"/>
      <line x1="0" y1="0" x2="0" y2="-180"/>
      <line x1="0" y1="0" x2="127.3" y2="-127.3"/>
    </g>

    <!-- стрелка -->
    <polygon points="0,-200 -10,-170 10,-170" fill="#ff3333"/>

  </g>
</svg>